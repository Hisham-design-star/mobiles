<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد عملية الدفع - Mobiles Pi</title>
    <script src="https://sdk.mine.pi/pi-sdk.js"></script>
    <style>
        body { background-color: #6700eb; color: white; text-align: center; font-family: Arial, sans-serif; padding: 40px; margin: 0; }
        .pay-card { background: white; color: #333; border-radius: 20px; padding: 30px; max-width: 400px; margin: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .btn-confirm { background: #00e676; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.2rem; transition: 0.3s; display: none; } /* يظهر بعد المصادقة */
        .btn-confirm:active { background: #00c853; transform: scale(0.98); }
        #amount-display { color: #6700eb; font-size: 2.5rem; margin: 15px 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #ffcc00; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status-text { font-size: 0.9rem; margin-top: 15px; color: #666; }
    </style>
</head>
<body>
    <div class="pay-card">
        <h2>تأكيد الطلب</h2>
        <p>أنت على وشك شراء هاتف ذكي</p>
        <h1 id="amount-display">...</h1>
        <div id="loading-spinner" class="loader"></div>
        <button id="pay-button" class="btn-confirm">دفع الآن بواسطة Pi</button>
        <p id="status-text">جاري الاتصال بشبكة Pi...</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const price = urlParams.get('price') || '1.0';
        document.getElementById('amount-display').innerText = price + " Pi";

        const payBtn = document.getElementById('pay-button');
        const spinner = document.getElementById('loading-spinner');
        const statusText = document.getElementById('status-text');

        async function startSystem() {
            try {
                // تهيئة المكتبة
                await Pi.init({ version: "2.0", sandbox: false });
                
                // المصادقة التلقائية لإزالة التحذير الأحمر وتفعيل الزر
                const auth = await Pi.authenticate(['payments', 'wallet_address'], onIncompletePaymentFound);
                
                // إذا وصلنا هنا، يعني المتصفح استجاب والمصادقة تمت
                spinner.style.display = 'none';
                payBtn.style.display = 'block';
                statusText.innerText = "جاهز لإتمام العملية الآمنة";
                statusText.style.color = "green";

                payBtn.onclick = async () => {
                    payBtn.disabled = true;
                    statusText.innerText = "جاري فتح المحفظة، يرجى عدم غلق الصفحة...";
                    
                    try {
                        const payment = await Pi.createPayment({
                            amount: parseFloat(price),
                            memo: "شراء هاتف من Mobiles Pi Store",
                            metadata: { orderId: "order_" + Date.now() },
                        }, {
                            onReadyForServerApproval: (id) => console.log("Approved", id),
                            onReadyForServerCompletion: (id, txid) => {
                                statusText.innerText = "تم الدفع بنجاح! جاري توجيهك...";
                                setTimeout(() => {
                                    window.location.href = "https://mobiles-pi-store.carrd.co/#success";
                                }, 2500);
                            },
                            onCancel: (id) => {
                                payBtn.disabled = false;
                                statusText.innerText = "تم إلغاء الدفع.";
                            },
                            onError: (error) => {
                                payBtn.disabled = false;
                                alert("خطأ في الدفع: " + error.message);
                            }
                        });
                    } catch (e) {
                        payBtn.disabled = false;
                        alert("تعذر الاتصال بالمحفظة.");
                    }
                };

            } catch (err) {
                spinner.style.display = 'none';
                statusText.innerText = "تأكد من فتح الرابط داخل Pi Browser للمتابعة.";
                statusText.style.color = "red";
            }
        }

        function onIncompletePaymentFound(payment) { console.log("Payment pending", payment); }

        window.onload = startSystem;
    </script>
</body>
</html>
