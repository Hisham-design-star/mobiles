<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobiles Pi Store - جاري التحويل</title>
    <script src="https://sdk.mine.pi/pi-sdk.js"></script>
    <style>
        body { 
            background-color: #6700eb; 
            color: white; 
            text-align: center; 
            font-family: Arial, sans-serif; 
            padding-top: 100px;
            margin: 0;
        }
        .loader { 
            border: 5px solid #f3f3f3; 
            border-top: 5px solid #ffcc00; 
            border-radius: 50%; 
            width: 50px; 
            height: 50px; 
            animation: spin 1.5s linear infinite; 
            margin: 20px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-text { font-size: 1.2rem; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>سوق الهواتف الذكية</h1>
    <div class="loader"></div>
    <p class="status-text">جاري تحويلك إلى المتجر الآن...</p>

    <script>
        // هذه الدالة هي المسؤولة عن نقلك لكارد بشكل حتمي
        function redirectToCarrd() {
            window.location.href = "https://mobiles-pi-store.carrd.com/";
        }

        async function safeBridge() {
            try {
                // نحاول الاتصال بشبكة Pi إذا كنا داخل متصفحها
                if (typeof Pi !== 'undefined') {
                    await Pi.init({ version: "2.0", sandbox: false });
                    // طلب المصادقة بشكل صامت دون إيقاف العملية إذا تأخرت
                    Pi.authenticate(['username', 'payments', 'wallet_address'], function(payment) {
                        console.log("Incomplete payment", payment);
                    }).catch(e => console.log("Auth skipped"));
                }
            } catch (err) {
                // تجاهل أي خطأ يحدث (مثل عدم وجود المكتبة في كروم)
                console.log("Not in Pi Browser, proceeding to store...");
            } finally {
                // الكلمة السحرية (finally): تعني "افعل هذا دائماً مهما حدث"
                // تحويل للمتجر بعد ثانية واحدة فقط
                setTimeout(redirectToCarrd, 1000);
            }
        }

        // تشغيل العملية فور فتح الصفحة
        window.onload = safeBridge;
    </script>
</body>
</html>
