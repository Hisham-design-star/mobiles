<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobiles Pi Store - جاري التحويل الآمن</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { 
            background-color: #6700eb; 
            color: white; 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding-top: 100px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
        }
        .loader { 
            border: 5px solid rgba(255,255,255,0.3); 
            border-top: 5px solid #ffcc00; 
            border-radius: 50%; 
            width: 60px; 
            height: 60px; 
            animation: spin 1s linear infinite; 
            margin: 20px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-text { font-size: 1.1rem; margin-top: 20px; opacity: 0.9; }
        .brand { font-weight: bold; font-size: 2rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="brand">Mobiles Pi Store</div>
    <div class="loader"></div>
    <p class="status-text" id="status-msg">جاري التحقق من الهوية الرقمية...</p>

    <script>
        // رابط المتجر على Carrd
        const STORE_URL = "https://mobiles-pi-store.carrd.co/";

        function redirectToStore() {
            window.location.href = STORE_URL;
        }

        async function initPiBridge() {
            const statusMsg = document.getElementById('status-msg');
            
            try {
                // التأكد من تهيئة المكتبة بالرابط الجديد
                if (window.Pi) {
                    await Pi.init({ version: "2.0", sandbox: false });
                    
                    // مصادقة سريعة (Silent Authentication) لجعل التطبيق يبدو موثوقاً
                    // نضع وقت مستقطع (Timeout) للمصادقة لضمان عدم تعليق الصفحة
                    const authPromise = Pi.authenticate(['username', 'payments', 'wallet_address'], function(p) {
                        console.log("Incomplete payment found", p);
                    });

                    // ننتظر المصادقة لمدة ثانيتين فقط، إذا تأخرت ننتقل للمتجر فوراً
                    await Promise.race([
                        authPromise,
                        new Promise(resolve => setTimeout(resolve, 2000))
                    ]);
                    
                    statusMsg.innerText = "تم التحقق! جاري دخول المتجر...";
                }
            } catch (err) {
                console.log("Not in Pi Browser or Auth failed, redirecting...");
                statusMsg.innerText = "جاري الانتقال للمتجر...";
            } finally {
                // التحويل النهائي
                setTimeout(redirectToStore, 500);
            }
        }

        // تشغيل العملية
        window.onload = initPiBridge;
    </script>
</body>
</html>
