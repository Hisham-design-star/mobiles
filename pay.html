<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد عملية الدفع - Mobiles Pi</title>
    <script src="https://sdk.mine.pi/pi-sdk.js"></script>
    <style>
        body { background-color: #6700eb; color: white; text-align: center; font-family: Arial, sans-serif; padding: 40px; margin: 0; }
        .pay-card { background: white; color: #333; border-radius: 20px; padding: 30px; max-width: 400px; margin: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .btn-confirm { background: #00e676; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.2rem; transition: 0.3s; }
        .btn-confirm:active { background: #00c853; transform: scale(0.98); }
        #amount-display { color: #6700eb; font-size: 2.5rem; margin: 15px 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #ffcc00; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: none; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="pay-card">
        <h2>تأكيد الطلب</h2>
        <p>أنت على وشك شراء هاتف ذكي</p>
        <h1 id="amount-display">...</h1>
        <div id="loader" class="loader"></div>
        <button id="pay-button" class="btn-confirm">دفع الآن بواسطة Pi</button>
        <p id="status-msg" style="color: #666; font-size: 0.9rem; margin-top: 15px;">يرجى عدم إغلاق الصفحة أثناء المعالجة.</p>
    </div>

    <script>
        // 1. قراءة السعر من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const price = urlParams.get('price') || '1.0';
        document.getElementById('amount-display').innerText = "Pi " + price;

        const payBtn = document.getElementById('pay-button');
        const loader = document.getElementById('loader');
        const statusMsg = document.getElementById('status-msg');

        async function initPi() {
            try {
                // 2. تهيئة المكتبة
                await Pi.init({ version: "2.0", sandbox: false });
                
                // 3. المصادقة الإجبارية لتفعيل المحفظة (هذا هو الجزء الذي كان ينقصك)
                await Pi.authenticate(['payments', 'wallet_address'], onIncompletePaymentFound);

                // 4. برمجة الزر الأخضر
                payBtn.onclick = async () => {
                    payBtn.style.display = 'none';
                    loader.style.display = 'block';
                    statusMsg.innerText = "جاري فتح المحفظة...";

                    try {
                        const payment = await Pi.createPayment({
                            amount: parseFloat(price),
                            memo: "شراء هاتف من Mobiles Pi Store",
                            metadata: { orderId: "order_" + Date.now() },
                        }, {
                            onReadyForServerApproval: (id) => console.log("Approved ID: ", id),
                            onReadyForServerCompletion: (id, txid) => {
                                statusMsg.innerText = "تم الدفع بنجاح! جاري العودة للمتجر...";
                                setTimeout(() => {
                                    window.location.href = "https://mobiles-pi-store.carrd.com/#success";
                                }, 2000);
                            },
                            onCancel: (id) => {
                                payBtn.style.display = 'block';
                                loader.style.display = 'none';
                                statusMsg.innerText = "تم إلغاء عملية الدفع.";
                            },
                            onError: (error) => {
                                payBtn.style.display = 'block';
                                loader.style.display = 'none';
                                alert("خطأ: " + error.message);
                            }
                        });
                    } catch (e) {
                        payBtn.style.display = 'block';
                        loader.style.display = 'none';
                        alert("حدث خطأ تقني، يرجى المحاولة لاحقاً.");
                    }
                };

            } catch (err) {
                statusMsg.style.color = "red";
                statusMsg.innerText = "تأكد من فتح الرابط داخل Pi Browser.";
            }
        }

        function onIncompletePaymentFound(payment) { console.log("Incomplete payment found", payment); };

        window.onload = initPi;
    </script>
</body>
</html>
